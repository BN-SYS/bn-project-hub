<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>에디터 사용 예시</title>

  <!-- 외부 의존성: Quill + Google Fonts -->
  <link href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic&family=Noto+Sans+KR&display=swap" rel="stylesheet">

  <!-- QEditor 스타일 (에디터 페이지 + 뷰 페이지 공통 포함) -->
  <link rel="stylesheet" href="/assets/libs/qeditor/qeditor.css">

  <style>
    /* 이 아래는 페이지 자체 레이아웃 스타일 — 프로젝트 CSS에 작성 */
    body { background: #eee; font-family: Arial; }
    .wrap { max-width: 900px; margin: 50px auto; background: #fff; padding: 30px; box-shadow: 0 2px 10px rgba(0,0,0,.1); }
    input[type="text"] { width: 100%; height: 40px; margin-bottom: 15px; padding: 0 10px; border: 1px solid #ccc; box-sizing: border-box; font-size: 14px; }
    button[type="submit"] { margin-top: 15px; padding: 10px 30px; background: #333; color: #fff; border: none; cursor: pointer; font-size: 15px; }
    @media (max-width: 600px) { .wrap { padding: 16px; margin: 16px auto; } }
  </style>
</head>
<body>

  <div class="wrap">
    <h2>게시글 작성</h2>
    <form id="postForm">
      <label>제목</label>
      <input type="text" name="title" placeholder="제목을 입력하세요">

      <label>내용</label>
      <!-- 에디터 마운트 포인트: id는 페이지 내 유일해야 함 -->
      <div id="editor"></div>

      <button type="submit">저장</button>
    </form>
  </div>

  <!-- Quill → QEditor 순서로 로드 -->
  <script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"></script>
  <script src="/assets/libs/qeditor/qeditor.js"></script>

  <script>
    /* ── 페이지별 초기화 코드 ─────────────────────────────────── */

    QEditor.init('editor', {
      uploadUrl : '/board/upload',  /* 실서버 연동 시 실제 경로로 교체 */
      mockUpload: true,             /* 실서버 연동 시 false */
      minHeight : '450px',
      maxLength : 0,
    });

    document.getElementById('postForm').addEventListener('submit', function (e) {
      e.preventDefault();

      const title   = document.querySelector('[name="title"]').value.trim();
      const content = QEditor.getValue('editor');

      if (!title)               { alert('제목을 입력해주세요.'); return; }
      if (QEditor.isEmpty('editor')) { alert('내용을 입력해주세요.'); return; }

      /*
       * ── 저장 API 연동 예시 (JSON 방식) ─────────────────────
       * PHP 수신:
       *   $data    = json_decode(file_get_contents('php://input'), true);
       *   $title   = htmlspecialchars($data['title']   ?? '', ENT_QUOTES);
       *   $content = $purifier->purify($data['content'] ?? '');
       *
       * form POST 방식을 쓰는 경우:
       *   HTML: <input type="hidden" id="contentHidden" name="content">
       *   JS  : document.getElementById('contentHidden').value = QEditor.getValue('editor');
       * ──────────────────────────────────────────────────────── */
      fetch('/board/store', {
        method : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body   : JSON.stringify({ title, content }),
      })
        .then(function (res) { return res.json(); })
        .then(function ()    { alert('저장 완료!'); })
        .catch(function ()   { alert('저장 실패. 다시 시도해주세요.'); });
    });
  </script>

</body>
</html>
