<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>비엔시스템 견적서 생성기</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy: #1B3A6B;
  --blue: #2563EB;
  --blue-lt: #EFF4FF;
  --gray1: #F8FAFC;
  --gray2: #E9EEF5;
  --gray3: #94A3B8;
  --gray4: #475569;
  --dark: #1E293B;
  --white: #FFFFFF;
  --border: #D1D9E6;
  --accent: #E53E3E;
}

body {
  font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif;
  background: #EEF2F9;
  min-height: 100vh;
}

/* ── 화면 레이아웃 ── */
.app-layout {
  display: grid;
  grid-template-columns: 360px 1fr;
  min-height: 100vh;
}

/* ── 입력 패널 ── */
.input-panel {
  background: var(--navy);
  padding: 32px 24px;
  overflow-y: auto;
  position: sticky;
  top: 0;
  height: 100vh;
}

.panel-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 28px;
  padding-bottom: 20px;
  border-bottom: 1px solid rgba(255,255,255,0.12);
}

.logo-badge {
  background: var(--blue);
  color: white;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .08em;
  padding: 4px 10px;
  border-radius: 4px;
}

.panel-title {
  font-size: 13px;
  font-weight: 600;
  color: rgba(255,255,255,0.6);
  letter-spacing: .1em;
  text-transform: uppercase;
}

.section-group {
  margin-bottom: 24px;
}

.section-group-label {
  font-size: 11px;
  font-weight: 700;
  color: rgba(255,255,255,0.35);
  letter-spacing: .12em;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.field {
  margin-bottom: 10px;
}

.field label {
  display: block;
  font-size: 11.5px;
  font-weight: 500;
  color: rgba(255,255,255,0.55);
  margin-bottom: 5px;
  letter-spacing: .02em;
}

.field input,
.field textarea {
  width: 100%;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 6px;
  padding: 9px 12px;
  font-size: 13px;
  font-family: inherit;
  color: white;
  outline: none;
  transition: border-color .15s, background .15s;
}

.field input::placeholder,
.field textarea::placeholder {
  color: rgba(255,255,255,0.25);
}

.field input:focus,
.field textarea:focus {
  border-color: rgba(255,255,255,0.4);
  background: rgba(255,255,255,0.11);
}

.field textarea {
  resize: vertical;
  min-height: 72px;
}

/* 일수 입력 그리드 */
.days-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.days-item label {
  font-size: 11px;
  color: rgba(255,255,255,0.45);
  margin-bottom: 4px;
  display: block;
}

.days-item input {
  width: 100%;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 6px;
  padding: 8px 10px;
  font-size: 13px;
  font-family: inherit;
  color: white;
  outline: none;
  text-align: center;
  transition: border-color .15s;
}

.days-item input:focus {
  border-color: rgba(255,255,255,0.4);
}

/* 등급 선택 */
.grade-select-wrap {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 4px;
  margin-bottom: 10px;
}

.grade-btn {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  color: rgba(255,255,255,0.5);
  font-size: 11.5px;
  font-family: inherit;
  font-weight: 500;
  padding: 7px 4px;
  border-radius: 5px;
  cursor: pointer;
  transition: all .15s;
  text-align: center;
}

.grade-btn:hover {
  background: rgba(255,255,255,0.12);
  color: rgba(255,255,255,0.8);
}

.grade-btn.active {
  background: var(--blue);
  border-color: var(--blue);
  color: white;
  font-weight: 600;
}

/* 인건비 소계 표시 */
.labor-summary {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 6px;
  padding: 10px 12px;
  margin-bottom: 10px;
}

.labor-summary-row {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: rgba(255,255,255,0.5);
  margin-bottom: 4px;
}

.labor-summary-row:last-child {
  margin-bottom: 0;
  color: rgba(255,255,255,0.8);
  font-weight: 600;
  font-size: 13px;
  padding-top: 6px;
  border-top: 1px solid rgba(255,255,255,0.1);
  margin-top: 4px;
}

.labor-summary-row span:last-child {
  color: #93C5FD;
}

.labor-summary-row:last-child span:last-child {
  color: white;
}

/* 제경비 토글 */
.expense-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}

.toggle-label {
  font-size: 11.5px;
  color: rgba(255,255,255,0.55);
}

.toggle-switch {
  position: relative;
  width: 36px;
  height: 20px;
  flex-shrink: 0;
}

.toggle-switch input { opacity: 0; width: 0; height: 0; }

.toggle-track {
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0.15);
  border-radius: 20px;
  cursor: pointer;
  transition: background .2s;
}

.toggle-track::after {
  content: '';
  position: absolute;
  width: 14px;
  height: 14px;
  left: 3px;
  top: 3px;
  background: white;
  border-radius: 50%;
  transition: transform .2s;
}

.toggle-switch input:checked + .toggle-track {
  background: var(--blue);
}

.toggle-switch input:checked + .toggle-track::after {
  transform: translateX(16px);
}

/* 버튼 */
.action-row {
  display: flex;
  gap: 8px;
  margin-top: 8px;
}

.btn {
  flex: 1;
  padding: 11px;
  border: none;
  border-radius: 7px;
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
}

.btn-reset {
  background: rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.6);
}

.btn-reset:hover {
  background: rgba(255,255,255,0.14);
  color: rgba(255,255,255,0.9);
}

.btn-print {
  background: var(--blue);
  color: white;
  letter-spacing: .02em;
}

.btn-print:hover {
  background: #1d4ed8;
  transform: translateY(-1px);
}

.btn-word {
  background: rgba(37,99,235,0.65);
  color: white;
}
.btn-word:hover { background: rgba(37,99,235,0.9); }
.btn-word:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

/* ── 미리보기 영역 ── */
.preview-area {
  padding: 40px 32px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.preview-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--gray3);
  letter-spacing: .12em;
  text-transform: uppercase;
  margin-bottom: 16px;
  align-self: flex-start;
}

/* ── 실제 견적서 ── */
.estimate-doc {
  background: white;
  width: 100%;
  max-width: 740px;
  padding: 50px 56px;
  box-shadow: 0 8px 40px rgba(27,58,107,.12);
  border-radius: 4px;
}

/* 로고/헤더 */
.est-logo-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 32px;
}

.est-logo-box {
  background: var(--navy);
  color: white;
  font-size: 13px;
  font-weight: 800;
  letter-spacing: .06em;
  padding: 6px 12px;
  border-radius: 3px;
}

.est-logo-sub {
  font-size: 11px;
  color: var(--gray4);
  font-weight: 500;
}

.est-title {
  text-align: center;
  font-size: 32px;
  font-weight: 800;
  letter-spacing: .35em;
  color: var(--dark);
  margin-bottom: 28px;
  padding-bottom: 0;
}

/* 2단 메타 정보 */
.est-meta-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
  border: 1px solid #ccc;
  margin-bottom: 28px;
  font-size: 12.5px;
}

.est-meta-left, .est-meta-right {
  padding: 14px 18px;
  min-width: 0;
  overflow: hidden;
}

.est-meta-right {
  border-left: 1px solid #ccc;
  overflow: visible;
}

.est-meta-row {
  display: flex;
  gap: 6px;
  margin-bottom: 5px;
  line-height: 1.5;
}

.est-meta-row:last-child { margin-bottom: 0; }

.meta-key {
  font-weight: 600;
  color: var(--dark);
  white-space: nowrap;
  min-width: 64px;
}

.meta-val {
  color: var(--gray4);
}

.meta-val.highlight {
  font-weight: 700;
  color: var(--navy);
  font-size: 13px;
}

/* 견적 내역 테이블 */
.sec-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 10px;
  padding-left: 2px;
}

.sec-num {
  color: var(--navy);
  margin-right: 6px;
}

.est-table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 24px;
  font-size: 12.5px;
}

.est-table th {
  background: var(--navy);
  color: white;
  padding: 9px 12px;
  text-align: center;
  font-weight: 600;
  letter-spacing: .04em;
  font-size: 12px;
}

.est-table td {
  border: 1px solid #ddd;
  padding: 8px 12px;
  text-align: center;
  vertical-align: middle;
}

.est-table .col-item { text-align: center; font-weight: 700; background: var(--gray1); }
.est-table .col-name { text-align: left; padding-left: 16px; }
.est-table .col-amount { text-align: right; font-weight: 700; color: var(--navy); padding-right: 14px; }
.est-table .col-total-label { text-align: right; font-weight: 600; padding-right: 12px; background: var(--gray1); }
.est-table .col-subtotal { text-align: right; font-weight: 700; padding-right: 14px; }

.est-table .row-subtotal td { background: #F0F4FA; }
.est-table .row-expense td { }
.est-table .row-grand td {
  background: var(--navy);
  color: white;
  font-weight: 700;
  font-size: 13px;
  padding: 11px 14px;
}

.est-table .row-grand .col-amount {
  color: white;
  font-size: 14px;
  letter-spacing: .02em;
}

.footnote {
  font-size: 11.5px;
  color: var(--gray3);
  margin-top: -16px;
  margin-bottom: 24px;
  padding-left: 2px;
}

/* 기간 / 세부내역 섹션 */
.est-section {
  margin-bottom: 22px;
}

.est-section-body {
  font-size: 12.5px;
  color: var(--gray4);
  line-height: 1.9;
  padding-left: 4px;
}

.est-section-body b {
  color: var(--dark);
  font-weight: 600;
}

/* 견적조건 */
.condition-list {
  list-style: none;
  font-size: 12px;
  color: var(--gray4);
  line-height: 2;
  padding-left: 4px;
}

.condition-list li::before {
  content: counter(item) ') ';
  counter-increment: item;
  font-weight: 600;
  color: var(--dark);
}

.condition-list { counter-reset: item; }

/* 단가표 */
.rate-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  margin-top: 10px;
}

.rate-table th {
  background: var(--gray2);
  color: var(--dark);
  padding: 7px 10px;
  text-align: center;
  font-weight: 600;
  border: 1px solid #ddd;
}

.rate-table td {
  border: 1px solid #ddd;
  padding: 7px 10px;
  text-align: center;
  color: var(--gray4);
}

.rate-note {
  font-size: 11px;
  color: var(--gray3);
  margin-top: 4px;
  text-align: right;
}

/* 끝 */
.est-end {
  text-align: right;
  font-size: 12.5px;
  color: var(--gray3);
  margin-top: 12px;
}

/* ── 인쇄 ── */
@media print {
  .input-panel, .preview-label { display: none !important; }
  .app-layout { display: block; }
  .preview-area { padding: 0; }
  .estimate-doc { 
    box-shadow: none; 
    padding: 20px 28px;
    max-width: 100%;
    border-radius: 0;
  }
  body { background: white; }
  .est-table .row-grand td,
  .est-table th {
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  .est-logo-box {
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
}
</style>
</head>
<body>

<div class="app-layout">

  <!-- ── 입력 패널 ── -->
  <div class="input-panel">

    <div class="panel-logo">
      <div class="logo-badge">BN</div>
      <div class="panel-title">견적서 생성기</div>
    </div>

    <!-- 기본 정보 -->
    <div class="section-group">
      <div class="section-group-label">기본 정보</div>

      <div class="field">
        <label>문서번호</label>
        <input type="text" id="docNo" placeholder="예: BN-260413-E03" oninput="render()">
      </div>

      <div class="field">
        <label>수신 (고객사명)</label>
        <input type="text" id="clientName" placeholder="예: 코비인사이트(주)" oninput="render()">
      </div>

      <div class="field">
        <label>건명 (프로젝트명)</label>
        <input type="text" id="projectName" placeholder="예: 홈페이지 내 오프라인 강의 신청 결제 기능" oninput="render()">
      </div>
    </div>

    <!-- 계약 조건 -->
    <div class="section-group">
      <div class="section-group-label">계약 조건</div>

      <div class="field">
        <label>결제조건</label>
        <input type="text" id="paymentTerm" value="계좌이체(계약금50%, 잔금50%)" oninput="render()">
      </div>

      <div class="field">
        <label>기간</label>
        <input type="text" id="period" placeholder="예: 협의  /  2026년 5월 ~ 6월" oninput="render()">
      </div>
    </div>

    <!-- 인건비 단가 등급 -->
    <div class="section-group">
      <div class="section-group-label">SW기술자 단가 기준 (2018 KOSA)</div>

      <div class="days-grid" style="margin-bottom:12px;">
        <div class="days-item">
          <label>기획·PM 단가</label>
          <input type="text" id="pricepm" value="239,748" oninput="formatAndRender(this)">
        </div>
        <div class="days-item">
          <label>디자인·퍼블 단가</label>
          <input type="text" id="pricedesign" value="239,748" oninput="formatAndRender(this)">
        </div>
        <div class="days-item">
          <label>개발 단가</label>
          <input type="text" id="pricedev" value="305,433" oninput="formatAndRender(this)">
        </div>
        <div class="days-item">
          <label>검수 단가</label>
          <input type="text" id="priceqa" value="239,748" oninput="formatAndRender(this)">
        </div>
      </div>

      <div class="section-group-label" style="margin-bottom:8px;">투입 일수</div>
      <div class="days-grid">
        <div class="days-item">
          <label>기획·PM (일)</label>
          <input type="number" id="dayspm" value="0" min="0" step="0.5" oninput="render()">
        </div>
        <div class="days-item">
          <label>디자인·퍼블 (일)</label>
          <input type="number" id="daysdesign" value="0" min="0" step="0.5" oninput="render()">
        </div>
        <div class="days-item">
          <label>개발 (일)</label>
          <input type="number" id="daysdev" value="0" min="0" step="0.5" oninput="render()">
        </div>
        <div class="days-item">
          <label>검수 (일)</label>
          <input type="number" id="daysqa" value="0" min="0" step="0.5" oninput="render()">
        </div>
      </div>
    </div>

    <!-- 인건비 소계 표시 -->
    <div class="labor-summary" id="laborSummaryBox">
      <div class="labor-summary-row"><span>기획·PM</span><span id="s-pm">0</span></div>
      <div class="labor-summary-row"><span>디자인·퍼블</span><span id="s-design">0</span></div>
      <div class="labor-summary-row"><span>개발</span><span id="s-dev">0</span></div>
      <div class="labor-summary-row"><span>검수</span><span id="s-qa">0</span></div>
      <div class="labor-summary-row"><span>인건비 소계</span><span id="s-labor">0 원</span></div>
    </div>

    <!-- 제경비 -->
    <div class="section-group">
      <div class="expense-toggle">
        <label class="toggle-switch">
          <input type="checkbox" id="expenseAuto" checked onchange="render()">
          <span class="toggle-track"></span>
        </label>
        <span class="toggle-label">제경비 자동 (인건비 × 10%)</span>
      </div>

      <div class="field" id="expenseManualWrap" style="display:none;">
        <label>제경비 직접 입력 (원)</label>
        <input type="text" id="expenseManual" placeholder="0" oninput="formatAndRender(this)">
      </div>
    </div>

    <!-- 특별할인 -->
    <div class="section-group">
      <div class="expense-toggle">
        <label class="toggle-switch">
          <input type="checkbox" id="discountOn" onchange="toggleDiscount()">
          <span class="toggle-track"></span>
        </label>
        <span class="toggle-label">특별할인 적용</span>
      </div>

      <div id="discountWrap" style="display:none;">
        <div class="field">
          <label>할인 항목명</label>
          <input type="text" id="discountLabel" value="특별할인" oninput="render()">
        </div>
        <div class="field">
          <label>할인 금액 (원)</label>
          <input type="text" id="discountAmount" placeholder="0" oninput="formatAndRender(this)">
        </div>
      </div>
    </div>

    <!-- 세부 내역 메모 -->
    <div class="section-group">
      <div class="section-group-label">세부 내역 (비고)</div>
      <div class="field">
        <textarea id="detailMemo" placeholder="세부 작업 내용을 입력하세요&#10;예: ◦ KG이니시스 일반결제 연동&#10;◦ 강의사이트 상단메뉴 추가" oninput="render()"></textarea>
      </div>
    </div>

    <div class="action-row">
      <button class="btn btn-reset" onclick="resetAll()">초기화</button>
      <button class="btn btn-word" onclick="exportToWord()">Word 저장</button>
      <button class="btn btn-print" onclick="printDoc()">🖨 PDF 저장</button>
    </div>

  </div>

  <!-- ── 미리보기 ── -->
  <div class="preview-area">
    <div class="preview-label">미리보기 · 실시간 반영</div>
    <div class="estimate-doc" id="estimateDoc">
      <!-- JS로 렌더링 -->
    </div>
  </div>

</div>

<script>
// 단가 데이터
const RATES = {
  고급: { pm: 305433, design: 305433, dev: 305433, qa: 305433 },
  중급: { pm: 239748, design: 239748, dev: 239748, qa: 239748 },
  초급: { pm: 215681, design: 215681, dev: 215681, qa: 215681 },
};

function fmt(n) {
  if (!n && n !== 0) return '0';
  return Math.round(n).toLocaleString('ko-KR');
}

function parseNum(val) {
  return parseFloat((val || '').replace(/,/g, '')) || 0;
}

function formatAndRender(el) {
  const raw = el.value.replace(/[^0-9]/g, '');
  el.value = raw ? Number(raw).toLocaleString() : '';
  render();
}

document.getElementById('expenseAuto').addEventListener('change', function() {
  document.getElementById('expenseManualWrap').style.display = this.checked ? 'none' : 'block';
  render();
});

function toggleDiscount() {
  const on = document.getElementById('discountOn').checked;
  document.getElementById('discountWrap').style.display = on ? 'block' : 'none';
  render();
}

function getValues() {
  const pricepm     = parseNum(document.getElementById('pricepm').value);
  const pricedesign = parseNum(document.getElementById('pricedesign').value);
  const pricedev    = parseNum(document.getElementById('pricedev').value);
  const priceqa     = parseNum(document.getElementById('priceqa').value);

  const dayspm     = parseFloat(document.getElementById('dayspm').value) || 0;
  const daysdesign = parseFloat(document.getElementById('daysdesign').value) || 0;
  const daysdev    = parseFloat(document.getElementById('daysdev').value) || 0;
  const daysqa     = parseFloat(document.getElementById('daysqa').value) || 0;

  const amtpm     = Math.round(pricepm * dayspm);
  const amtdesign = Math.round(pricedesign * daysdesign);
  const amtdev    = Math.round(pricedev * daysdev);
  const amtqa     = Math.round(priceqa * daysqa);

  const labor = amtpm + amtdesign + amtdev + amtqa;

  const autoExpense = document.getElementById('expenseAuto').checked;
  const expense = autoExpense
    ? Math.round(labor * 0.1)
    : parseNum(document.getElementById('expenseManual').value);

  const discountOn = document.getElementById('discountOn').checked;
  const discount = discountOn ? parseNum(document.getElementById('discountAmount').value) : 0;
  const discountLabel = discountOn ? (document.getElementById('discountLabel').value || '특별할인') : '';

  const total = labor + expense - discount;

  return { pricepm, pricedesign, pricedev, priceqa,
           dayspm, daysdesign, daysdev, daysqa,
           amtpm, amtdesign, amtdev, amtqa,
           labor, expense, discount, discountLabel, discountOn, total };
}

}

// 인건비 항목 rowspan 계산
function rowspan(v) {
  let cnt = 0;
  if (v.dayspm > 0) cnt++;
  if (v.daysdesign > 0) cnt++;
  if (v.daysdev > 0) cnt++;
  if (v.daysqa > 0) cnt++;
  return Math.max(cnt, 1);
}

function escHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

    const subtotalRow = new TableRow({ children: [
      tc(pr([tx('소계',{b:true,sz:20})],        AlignmentType.RIGHT,  50, 50), { cs:5, sh: C.g1 }),
      tc(pr([tx('')],                            AlignmentType.CENTER, 50, 50)),
      tc(pr([tx(fmt(v.labor),{b:true,sz:20})],  AlignmentType.RIGHT,  50, 50)),
    ]});
    const expenseRow = new TableRow({ children: [
      tc(pr([tx('기타',{b:true,sz:20})],         AlignmentType.CENTER, 50, 50), { sh: C.g1 }),
      tc(pr([tx('제경비',{sz:20})],              AlignmentType.LEFT,   50, 50), { cs:5 }),
      tc(pr([tx(fmt(v.expense),{b:true,sz:20})], AlignmentType.RIGHT,  50, 50)),
    ]});
    const discountRows = (v.discountOn && v.discount > 0) ? [new TableRow({ children: [
      tc(pr([tx('기타',{b:true,sz:20,c:C.red})],          AlignmentType.CENTER, 50, 50)),
      tc(pr([tx(v.discountLabel,{b:true,sz:20,c:C.red})],  AlignmentType.LEFT,  50, 50), { cs:5 }),
      tc(pr([tx('▼ '+fmt(v.discount),{b:true,sz:20,c:C.red})], AlignmentType.RIGHT, 50, 50)),
    ]})] : [];
    const grandRow = new TableRow({ children: [
      tc(pr([tx('총 합계  (공급가액, 부가가치세 별도)',{b:true,sz:22,c:C.white})], AlignmentType.CENTER,80,80), { cs:6, sh: C.navy }),
      tc(pr([tx(fmt(v.total)+' 원',{b:true,sz:24,c:C.white})], AlignmentType.RIGHT,80,80), { sh: C.navy }),
    ]});
    const estTable = new Table({ width: { size:100, type: WidthType.PERCENTAGE },
      rows: [hdrRow, ...jobRows, subtotalRow, expenseRow, ...discountRows, grandRow] });

    const secTitle = (num, title) => pr([tx(num+'. ',{b:true,sz:26,c:C.navy}), tx(title,{b:true,sz:26})], AlignmentType.LEFT, 200, 100);

    const memoParas = inp.memo
      ? inp.memo.split('\n').map(line => pr([tx(line||' ',{sz:22,c:C.g4})], AlignmentType.LEFT, 0, 30))
      : [pr([tx('(없음)',{sz:22,c:C.g3})], AlignmentType.LEFT, 0, 30)];

    const condParas = [
      '본 견적은 작성일자로부터 20일 간 유효함',
      '본 견적은 요구사항을 기준으로 했음, 요구사항이 변경될 경우 변동될 수 있음',
      '본 견적은 2018년 한국소프트웨어산업협회 단가를 기준으로 산정함',
    ].map((c, i) => pr([tx(`${i+1}) ${c}`,{sz:22,c:C.g4})], AlignmentType.LEFT, 0, 30));

    const rateTable = new Table({ width: { size:100, type: WidthType.PERCENTAGE },
      rows: [
        new TableRow({ children: ['구분','일평균임금 (M/D)','월평균임금 (M/M)','시간평균임금 (M/H)'].map(h =>
          tc(pr([tx(h,{b:true,sz:20})], AlignmentType.CENTER,50,50), { sh: C.g2 })
        )}),
        ...[ ['고급기술자','305,433','6,353,006','38,179'],
             ['중급기술자','239,748','4,986,758','29,969'],
             ['초급기술자','215,681','4,486,165','26,960'],
        ].map(row => new TableRow({ children: row.map(val =>
          tc(pr([tx(val,{sz:20,c:C.g4})], AlignmentType.CENTER,50,50))
        )}))
      ]
    });

    const wordDoc = new Document({
      styles: { default: { document: { run: { font: F, size: 22 } } } },
      sections: [{ properties: { page: { margin: { top:1000, bottom:1000, left:1200, right:1200 } } },
        children: [
          logoPara, titlePara, metaTable,
          pr([tx('')], AlignmentType.LEFT, 0, 0),
          secTitle('1','견적내역'),
          estTable,
          pr([tx('* 휴일 제외 업무일(월20일) 기준',{sz:18,c:C.g3})], AlignmentType.LEFT, 60, 200),
          secTitle('2','기간'),
          pr([tx('◦ 기간: ',{sz:22}), tx(inp.period,{b:true,sz:22})], AlignmentType.LEFT, 0, 200),
          secTitle('3','세부내역'),
          ...memoParas,
          pr([tx('')], AlignmentType.LEFT, 100, 0),
          secTitle('4','견적조건'),
          ...condParas,
          pr([tx('※ 2018년 SW기술자 평균임금 – 등급별  (단위: 원)',{sz:20,c:C.g4})], AlignmentType.CENTER, 200, 80),
          rateTable,
          pr([tx('* 한국소프트웨어산업협회',{sz:18,c:C.g3})], AlignmentType.RIGHT, 60, 200),
          pr([tx('(이상)',{sz:22,c:C.g3})], AlignmentType.RIGHT, 0, 0),
        ]
      }]
    });

    const blob = await Packer.toBlob(wordDoc);
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `견적서_${inp.docNo}.docx`;
    a.click();
    URL.revokeObjectURL(url);

  } catch(e) {
    console.error('Word 변환 오류:', e);
    alert('Word 변환 중 오류가 발생했습니다:\n' + e.message);
  } finally {
    btn.textContent = orig;
    btn.disabled = false;
  }
}

// 초기 렌더
render();
</script>
</body>
</html>
