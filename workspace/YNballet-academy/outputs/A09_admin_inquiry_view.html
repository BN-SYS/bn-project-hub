<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>[A09] 문의 상세/답변 — YN발레아카데미 관리자</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<style>
  .admin-sidebar { width:200px; min-height:100vh; background:#212529; }
  .admin-sidebar .nav-link { color:#adb5bd; }
  .admin-sidebar .nav-link.active, .admin-sidebar .nav-link:hover { color:#fff; }
  .admin-main { flex:1; }
  .admin-topbar { background:#fff; border-bottom:1px solid #dee2e6; padding:12px 24px; }
  .badge-unanswered { background:#dc3545; }
  .badge-answered   { background:#198754; }
  .badge-pending    { background:#ffc107; color:#333; }
  .inquiry-content { background:#f8f9fa; border-radius:6px; padding:16px 20px; }
</style>
</head>
<body>
<!-- ============================================================
  SCREEN : [A09] 문의 상세/답변(관리자)
  PATH   : /admin/inquiry_view.php?id={id}
  SPEC   : data/specs/A09.js
  APIs   : [GET] SELECT id, name, contact, course_interest, content,
                  answer, status, answered_at, created_at
                  FROM inquiry WHERE id=?
           [POST] UPDATE inquiry
                  SET answer=?, status=?,
                      answered_at = IF(answered_at IS NULL, NOW(), answered_at)
                  WHERE id=?
  NOTE   : 답변 저장 시 status 자동 1(답변완료) 업데이트.
           answered_at: 최초 답변 시각만 기록 (수정해도 갱신 안 함).
           status는 select로 수동 변경도 가능 (0/1/2 모두 방향 자유).
           관리자 세션 없으면 redirect.
============================================================ -->

<div class="d-flex">

  <!-- [SECTION: ADMIN_SIDEBAR] -->
  <nav class="admin-sidebar d-flex flex-column p-3">
    <a class="text-white fw-bold text-decoration-none mb-4" href="A02_admin_notice_list.html">YN 관리자</a>
    <ul class="nav flex-column gap-1">
      <li class="nav-item">
        <span class="nav-link text-muted small px-0 mb-1">콘텐츠 관리</span>
      </li>
      <li class="nav-item">
        <a class="nav-link px-2 rounded" href="A02_admin_notice_list.html">공지사항</a>
      </li>
      <li class="nav-item">
        <a class="nav-link px-2 rounded" href="A05_admin_course_list.html">과정 관리</a>
      </li>
      <li class="nav-item mt-3">
        <span class="nav-link text-muted small px-0 mb-1">문의 관리</span>
      </li>
      <li class="nav-item">
        <a class="nav-link active px-2 rounded" href="A08_admin_inquiry_list.html">문의 목록</a>
      </li>
    </ul>
    <div class="mt-auto">
      <a href="/admin/logout.php" class="nav-link text-muted small px-2">로그아웃</a>
    </div>
  </nav>
  <!-- [/SECTION: ADMIN_SIDEBAR] -->

  <div class="admin-main">

    <!-- [SECTION: ADMIN_TOPBAR] -->
    <div class="admin-topbar d-flex align-items-center justify-content-between">
      <h1 class="h6 mb-0 fw-bold">문의 상세</h1>
      <a href="A08_admin_inquiry_list.html" class="btn btn-outline-secondary btn-sm">← 목록</a>
    </div>
    <!-- [/SECTION: ADMIN_TOPBAR] -->

    <!-- [SECTION: INQUIRY_DETAIL] 문의 상세 + 답변 폼
      API-DATA: SELECT id, name, contact, course_interest, content,
                answer, status, answered_at, created_at FROM inquiry WHERE id=?
    ──────────────────────────────────────── -->
    <div class="p-4" style="max-width:780px;">

      <!-- 문의 메타 정보 -->
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
          <!-- [API-DATA] status badge -->
          <span class="badge badge-unanswered me-2">미답변</span>
          <small class="text-muted">2026.04.20 작성</small>
        </div>
        <!-- 상태 직접 변경 (모든 방향 자유) -->
        <!-- [FORM: status_change]
          action: POST /admin/inquiry_status.php
          fields: id(hidden), status(select: 0/1/2)
          변경 즉시 submit (onchange)
        -->
        <form action="/admin/inquiry_status.php" method="POST" class="d-flex align-items-center gap-2">
          <input type="hidden" name="_token" value="[CSRF_TOKEN]">
          <input type="hidden" name="id" value="10">
          <label class="form-label small mb-0 text-muted">상태 변경:</label>
          <select name="status" class="form-select form-select-sm" style="width:auto;"
            onchange="this.form.submit()">
            <option value="0" selected>미답변</option>
            <option value="1">답변완료</option>
            <option value="2">보류</option>
          </select>
        </form>
        <!-- [/FORM: status_change] -->
      </div>

      <!-- 문의 정보 테이블 -->
      <div class="mb-3">
        <table class="table table-borderless table-sm">
          <tr>
            <th class="text-muted" style="width:90px;">작성자</th>
            <!-- [API-DATA] name 원문 표시 -->
            <td>홍길동</td>
            <th class="text-muted" style="width:90px;">연락처</th>
            <!-- [API-DATA] contact 원문 표시 -->
            <td>010-1234-5678</td>
          </tr>
          <tr>
            <th class="text-muted">관심 과정</th>
            <!-- [API-DATA] course_interest -->
            <td colspan="3">입문반</td>
          </tr>
        </table>
      </div>

      <!-- 문의 본문 -->
      <div class="inquiry-content mb-4">
        <p class="small text-muted mb-2 fw-medium">문의 내용</p>
        <!-- [API-DATA] content -->
        <p class="mb-0">[더미] 입문반 수강을 희망합니다. 등록 절차와 준비물을 알고 싶습니다. 수강료도 문의드립니다. 레오타드는 어디서 구입할 수 있나요?</p>
      </div>

      <!-- [SECTION: ANSWER_FORM] 답변 작성/수정 폼
        POST /admin/inquiry_view.php?id={id}
        UPDATE inquiry SET answer=?, status=1,
          answered_at = IF(answered_at IS NULL, NOW(), answered_at) WHERE id=?
        답변 저장 시 status 자동 1 업데이트
        answered_at: 최초 답변 시각만 기록
      ──────────────────────────────────────── -->
      <!-- [FORM: inquiry_answer]
        action: POST /admin/inquiry_view.php?id={id}
        fields:
          id     — hidden, inquiry.id
          answer — textarea, optional (비워서 저장 가능)
          status — hidden (답변 저장 시 1 고정; 상태 변경은 별도 폼)
        CSRF: hidden _token
      -->
      <form id="inquiry_answer" action="/admin/inquiry_view.php" method="POST">
        <input type="hidden" name="_token" value="[CSRF_TOKEN]">
        <input type="hidden" name="id" value="10">
        <input type="hidden" name="status_on_save" value="1">

        <div class="mb-3">
          <label for="answer" class="form-label fw-medium">
            답변 내용
            <!-- [API-DATA] answered_at != NULL → "최초 답변: {날짜}" 표시 -->
            <!-- <small class="text-muted ms-2">최초 답변: 2026.04.21</small> -->
          </label>
          <!-- [API-DATA] pre-fill: inquiry.answer (기존 답변이 있으면) -->
          <textarea class="form-control" id="answer" name="answer" rows="6"
            placeholder="답변을 입력하세요. 저장하면 status가 '답변완료'로 변경됩니다."></textarea>
          <div class="form-text text-muted">저장 시 상태가 자동으로 '답변완료'로 변경됩니다. 상태만 변경하려면 위의 상태 변경 셀렉트를 사용하세요.</div>
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-dark">답변 저장</button>
          <a href="A08_admin_inquiry_list.html" class="btn btn-outline-secondary">목록으로</a>
        </div>

      </form>
      <!-- [/FORM: inquiry_answer] -->
      <!-- [/SECTION: ANSWER_FORM] -->

    </div>
    <!-- [/SECTION: INQUIRY_DETAIL] -->

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
