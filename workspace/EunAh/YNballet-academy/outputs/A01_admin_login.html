<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>[A01] 관리자 로그인 — YN발레아카데미</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<style>
  body { background:#f0f0f0; }
  .login-card { max-width:400px; }
</style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">
<!-- ============================================================
  SCREEN : [A01] 관리자 로그인
  PATH   : /admin/login.php
  SPEC   : data/specs/A01.js
  APIs   : POST /admin/login.php
           → password_verify(입력값, ADMIN_PASSWORD_HASH)
           성공: $_SESSION['admin']=true → /admin/notice_list.php redirect
           실패: "아이디 또는 비밀번호가 올바르지 않습니다." 표시
  NOTE   : 단일 하드코딩 계정. DB 조회 없음.
           이미 로그인 상태이면 /admin/notice_list.php redirect.
           CSRF 토큰 적용 필요.
============================================================ -->

<!-- [SECTION: LOGIN_FORM] -->
<div class="login-card w-100 mx-auto px-3">
  <div class="text-center mb-4">
    <h1 class="h5 fw-bold">YN발레아카데미</h1>
    <p class="text-muted small">관리자 페이지</p>
  </div>

  <div class="card border shadow-sm">
    <div class="card-body p-4">

      <!-- 로그인 실패 시 표시 (서버사이드 렌더링) -->
      <!-- <div class="alert alert-danger small py-2" role="alert">아이디 또는 비밀번호가 올바르지 않습니다.</div> -->

      <!-- [FORM: admin_login]
        action: POST /admin/login.php
        fields:
          username — 아이디, text, required (하드코딩 계정과 비교)
          password — 비밀번호, password, required (password_verify)
        성공 → /admin/notice_list.php redirect
        실패 → 폼 유지 + 오류 메시지
        CSRF: hidden _token 필드 포함
      -->
      <form id="admin_login" action="/admin/login.php" method="POST">
        <input type="hidden" name="_token" value="[CSRF_TOKEN]">

        <div class="mb-3">
          <label for="username" class="form-label small fw-medium">아이디</label>
          <input type="text" class="form-control" id="username" name="username"
            placeholder="관리자 아이디" autocomplete="username" required>
        </div>

        <div class="mb-4">
          <label for="password" class="form-label small fw-medium">비밀번호</label>
          <input type="password" class="form-control" id="password" name="password"
            placeholder="비밀번호" autocomplete="current-password" required>
        </div>

        <div class="d-grid">
          <button type="submit" class="btn btn-dark">로그인</button>
        </div>
      </form>
      <!-- [/FORM: admin_login] -->

    </div>
  </div>

  <p class="text-center text-muted small mt-3">
    <a href="P01_landing.html" class="text-muted">← 사이트로 돌아가기</a>
  </p>
</div>
<!-- [/SECTION: LOGIN_FORM] -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
