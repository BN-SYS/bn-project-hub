<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>견적서</title>

<style>
body {
    font-family: 'Noto Sans KR', Arial;
    padding: 40px;
    color: #333;
}

h1 {
    text-align: center;
    margin-bottom: 30px;
}

.header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    border: 1px solid #ddd;
    padding: 10px;
    text-align: center;
}

th {
    background: #f8f8f8;
}

input {
    width: 90%;
    border: none;
    text-align: right;
}

.total-box {
    text-align: right;
    margin-top: 20px;
    font-size: 18px;
    font-weight: bold;
}

textarea {
    width: 100%;
    height: 120px;
    margin-top: 10px;
    padding: 10px;
    border: 1px solid #ccc;
    resize: none;
}

/* PDF 출력용 메모 */
#printMemo {
    display: none;
    white-space: pre-wrap;
    border: 1px solid #ccc;
    padding: 10px;
    min-height: 120px;
}

.buttons {
    margin-top: 20px;
}

button {
    padding: 8px 14px;
    margin-right: 5px;
}

/* 📄 출력 최적화 */
@media print {
    button {
        display: none;
    }
    textarea {
        display: none;
    }
    #printMemo {
        display: block !important;
    }
}
</style>

</head>
<body>

<h1>견적서</h1>

<div class="header">
    <div>업체명: 비엔시스템</div>
    <div>날짜: <input type="text" id="today" readonly></div>
</div>

<table id="estimateTable">
<thead>
<tr>
    <th>직무</th>
    <th>단가</th>
    <th>일수</th>
    <th>금액</th>
</tr>
</thead>

<tbody>

<tr>
    <td>PM</td>
    <td><input type="number" value="300000" oninput="calculate(this)"></td>
    <td><input type="number" value="0" oninput="calculate(this)"></td>
    <td class="amount">0</td>
</tr>

<tr>
    <td>기획</td>
    <td><input type="number" value="250000" oninput="calculate(this)"></td>
    <td><input type="number" value="0" oninput="calculate(this)"></td>
    <td class="amount">0</td>
</tr>

<tr>
    <td>디자인</td>
    <td><input type="number" value="280000" oninput="calculate(this)"></td>
    <td><input type="number" value="0" oninput="calculate(this)"></td>
    <td class="amount">0</td>
</tr>

<tr>
    <td>프론트엔드</td>
    <td><input type="number" value="350000" oninput="calculate(this)"></td>
    <td><input type="number" value="0" oninput="calculate(this)"></td>
    <td class="amount">0</td>
</tr>

<tr>
    <td>백엔드</td>
    <td><input type="number" value="380000" oninput="calculate(this)"></td>
    <td><input type="number" value="0" oninput="calculate(this)"></td>
    <td class="amount">0</td>
</tr>

</tbody>
</table>

<div class="total-box">
    총 합계: <span id="total">0</span> 원
</div>

<h3>비고</h3>

<textarea id="memoInput" placeholder="추가 설명, 조건 등을 입력하세요"></textarea>

<div id="printMemo"></div>

<div class="buttons">
    <button onclick="resetTable()">초기화</button>
    <button onclick="savePDF()">PDF 저장</button>
</div>

<script>
// 날짜 자동 입력
window.onload = function() {
    const d = new Date();
    document.getElementById('today').value =
        d.getFullYear() + '-' +
        String(d.getMonth()+1).padStart(2,'0') + '-' +
        String(d.getDate()).padStart(2,'0');

    updateTotal();
};

// 금액 계산
function calculate(el) {
    const row = el.closest('tr');
    const price = row.children[1].querySelector('input').value || 0;
    const days = row.children[2].querySelector('input').value || 0;
    const amount = price * days;

    row.children[3].innerText = Number(amount).toLocaleString();
    updateTotal();
}

// 총합 계산
function updateTotal() {
    let total = 0;
    document.querySelectorAll('.amount').forEach(td => {
        total += Number(td.innerText.replace(/,/g,'')) || 0;
    });
    document.getElementById('total').innerText = total.toLocaleString();
}

// 초기화
function resetTable() {
    if (!confirm("초기화 하시겠습니까?")) return;

    document.querySelectorAll('#estimateTable tbody tr').forEach(row => {
        row.children[2].querySelector('input').value = 0;
        row.children[3].innerText = 0;
    });

    document.getElementById('memoInput').value = '';
    updateTotal();
}

// PDF 저장 (메모 변환 포함)
function savePDF() {
    const memoInput = document.getElementById('memoInput');
    const printMemo = document.getElementById('printMemo');

    // textarea → div 변환
    printMemo.innerText = memoInput.value;

    memoInput.style.display = 'none';
    printMemo.style.display = 'block';

    window.print();

    // 복구
    memoInput.style.display = 'block';
    printMemo.style.display = 'none';
}
</script>

</body>
</html>
