<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>비엔시스템_견적산정</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy:    #1B3A6B;
  --blue:    #2563EB;
  --blue-lt: #EFF4FF;
  --gray1:   #F8FAFC;
  --gray2:   #E9EEF5;
  --gray3:   #94A3B8;
  --gray4:   #475569;
  --dark:    #1E293B;
  --white:   #FFFFFF;
  --border:  #D1D9E6;
  --radius:  10px;
  --shadow:  0 4px 24px rgba(27,58,107,.10);
}

body {
  font-family: 'Noto Sans KR', 'Malgun Gothic', Arial, sans-serif;
  background: #EEF2F9;
  color: var(--dark);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 48px 16px;
}

.card {
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  width: 100%;
  max-width: 850px;
  padding: 48px 52px 40px;
}

/* ── 문서 헤더 ── */
.doc-header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  border-bottom: 3px solid var(--navy);
  padding-bottom: 20px;
  margin-bottom: 32px;
}
.doc-title {
  font-size: 28px;
  font-weight: 800;
  color: var(--navy);
  letter-spacing: .04em;
}
.doc-meta {
  text-align: right;
  font-size: 13px;
  color: var(--gray4);
  line-height: 1.8;
}
.doc-meta strong { color: var(--dark); font-weight: 600; }
.doc-meta .date-value {
  display: inline-block;
  background: var(--blue-lt);
  color: var(--blue);
  font-weight: 700;
  padding: 2px 10px;
  border-radius: 20px;
  font-size: 13px;
  margin-left: 4px;
}

/* ── 테이블 ── */
.estimate-table {
  width: 100%;
  border-collapse: collapse;
}
.estimate-table thead tr {
  background: var(--navy);
  color: var(--white);
}
.estimate-table thead th {
  padding: 13px 16px;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: .06em;
  text-align: center;
}
.estimate-table thead th:first-child { border-radius: 6px 0 0 6px; }
.estimate-table thead th:last-child  { border-radius: 0 6px 6px 0; }

.estimate-table tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background .15s;
}
.estimate-table tbody tr:nth-child(even) { background: var(--gray1); }
.estimate-table tbody tr:hover { background: var(--blue-lt); }

.estimate-table tbody td {
  padding: 11px 16px;
  font-size: 14px;
  text-align: center;
}
.estimate-table tbody td:first-child {
  font-weight: 600;
  color: var(--navy);
  text-align: left;
  padding-left: 20px;
}

.estimate-table input[type="number"] {
  width: 100%;
  border: none;
  background: transparent;
  text-align: right;
  font-size: 14px;
  font-family: inherit;
  color: var(--dark);
  outline: none;
  padding: 4px 2px;
  border-bottom: 1px dashed transparent;
}
.estimate-table input[type="number"]:focus {
  border-bottom-color: var(--blue);
  background: rgba(37,99,235,.04);
  border-radius: 3px;
}

.amount {
  font-weight: 700;
  color: var(--navy);
  font-variant-numeric: tabular-nums;
}

/* ── 인건비 소계 행 ── */
.subtotal-row {
  background: var(--gray2) !important;
  border-top: 2px solid var(--border) !important;
}
.subtotal-row td {
  font-weight: 700 !important;
  color: var(--dark) !important;
}

/* ── 제경비 행 ── */
.expense-row td:first-child { color: var(--gray4) !important; font-weight: 500 !important; }
.expense-input-wrap {
  display: flex;
  align-items: center;
  justify-content: flex-end;
}
.expense-input-wrap input {
  width: 120px !important;
  font-weight: 700;
  color: var(--navy) !important;
}

/* ── 합계 박스 ── */
.summary-box {
  margin-top: 20px;
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.summary-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 13px 20px;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
}
.summary-row.grand {
  background: var(--navy);
  padding: 16px 20px;
  border-bottom: none;
}
.summary-label { font-weight: 600; color: var(--gray4); }
.summary-row.grand .summary-label { color: rgba(255,255,255,.8); }
.summary-value { font-weight: 700; color: var(--navy); font-size: 16px; }
.summary-row.grand .summary-value { color: var(--white); font-size: 22px; }

.rounding-note { text-align: right; margin-top: 8px; font-size: 11.5px; color: var(--gray3); }

/* ── 비고 ── */
.section-label { font-size: 13px; font-weight: 700; color: var(--gray4); margin: 28px 0 8px; }
textarea#memoInput {
  width: 100%; height: 100px; padding: 12px 14px; border: 1px solid var(--border); border-radius: 6px;
  font-family: inherit; font-size: 13.5px; background: var(--gray1); resize: none; outline: none;
}
#printMemo { display: none; white-space: pre-wrap; border: 1px solid var(--border); border-radius: 6px; padding: 12px 14px; font-size: 13.5px; background: var(--gray1); }

.btn-row { display: flex; justify-content: flex-end; gap: 10px; margin-top: 28px; }
.btn { padding: 10px 24px; font-size: 13.5px; font-weight: 600; border: none; border-radius: 6px; cursor: pointer; }
.btn-reset { background: var(--gray2); color: var(--gray4); }
.btn-pdf { background: var(--navy); color: var(--white); }

/* 인쇄 시 텍스트 복사를 위한 클래스 */
.print-only { display: none; }

@media print {
  body { background: white; padding: 0; }
  .card { box-shadow: none; padding: 20px; max-width: 100%; }
  .btn-row, input, textarea { display: none !important; }
  .print-only { display: inline !important; }
  #printMemo { display: block !important; }
  .estimate-table thead tr { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .summary-row.grand { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
}
</style>
</head>
<body>

<div class="card">
  <div class="doc-header">
    <div class="doc-title">견적서 작성 요청서</div>
    <div class="doc-meta">
      <div><strong>업체명</strong>&nbsp;&nbsp;비엔시스템</div>
      <div><strong>작성일</strong>&nbsp;&nbsp;<span class="date-value" id="today"></span></div>
    </div>
  </div>

  <table class="estimate-table" id="estimateTable">
    <thead>
      <tr>
        <th style="text-align:left; padding-left:20px;">직 무</th>
        <th>단 가 (원)</th>
        <th>일 수</th>
        <th>금 액 (원)</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>기획·PM</td>
        <td>
          <input type="number" value="239748" readonly tabindex="-1">
          <span class="print-only">239,748</span>
        </td>
        <td>
          <input type="number" value="0" tabindex="1" onfocus="clearZero(this)" onblur="restoreZero(this)" oninput="calculate(this)">
          <span class="print-only">0</span>
        </td>
        <td class="amount">0</td>
      </tr>
      <tr>
        <td>디자인·퍼블리싱</td>
        <td>
          <input type="number" value="239748" readonly tabindex="-1">
          <span class="print-only">239,748</span>
        </td>
        <td>
          <input type="number" value="0" tabindex="2" onfocus="clearZero(this)" onblur="restoreZero(this)" oninput="calculate(this)">
          <span class="print-only">0</span>
        </td>
        <td class="amount">0</td>
      </tr>
      <tr>
        <td>개발</td>
        <td>
          <input type="number" value="305433" readonly tabindex="-1">
          <span class="print-only">305,433</span>
        </td>
        <td>
          <input type="number" value="0" tabindex="3" onfocus="clearZero(this)" onblur="restoreZero(this)" oninput="calculate(this)">
          <span class="print-only">0</span>
        </td>
        <td class="amount">0</td>
      </tr>
      <tr>
        <td>검수</td>
        <td>
          <input type="number" value="239748" readonly tabindex="-1">
          <span class="print-only">239,748</span>
        </td>
        <td>
          <input type="number" value="0" tabindex="4" onfocus="clearZero(this)" onblur="restoreZero(this)" oninput="calculate(this)">
          <span class="print-only">0</span>
        </td>
        <td class="amount">0</td>
      </tr>

      <tr class="subtotal-row">
        <td colspan="3" style="text-align:right; padding-right:20px;">인건비 소계</td>
        <td id="laborSubtotal">0</td>
      </tr>

      <tr class="expense-row">
        <td>제경비</td>
        <td colspan="2"></td>
        <td>
          <div class="expense-input-wrap">
            <input type="number" id="expenseAmountInput" tabindex="5" oninput="manualExpense()" onfocus="this.select()">
            <span class="print-only" id="printExpense">0</span>
          </div>
        </td>
      </tr>
    </tbody>
  </table>

  <div class="summary-box">
    <div class="summary-row">
      <span class="summary-label">인건비 소계</span>
      <span class="summary-value"><span id="s-labor">0</span> 원</span>
    </div>
    <div class="summary-row">
      <span class="summary-label">제경비</span>
      <span class="summary-value"><span id="s-expense">0</span> 원</span>
    </div>
    <div class="summary-row grand">
      <span class="summary-label">총 합계 (공급가액, 부가가치세 별도)</span>
      <span class="summary-value"><span id="s-total">0</span> 원</span>
    </div>
  </div>
  <div class="rounding-note">※ 각 항목 금액은 소수점 첫째 자리에서 반올림 · 합계는 원 단위 정수 표시</div>

  <div class="section-label">비고</div>
  <textarea id="memoInput" placeholder="추가 설명, 조건 등을 입력하세요"></textarea>
  <div id="printMemo"></div>

  <div class="btn-row">
    <button class="btn btn-reset" onclick="resetTable()">초기화</button>
    <button class="btn btn-pdf" onclick="savePDF()">PDF 저장</button>
  </div>
</div>

<script>
let isManualExpense = false;

window.onload = function() {
  const d = new Date();
  document.getElementById('today').textContent = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  updateAll();
};

function clearZero(el) { if (el.value === '0') el.value = ''; }
function restoreZero(el) { if (el.value === '') el.value = 0; calculate(el); }

function calculate(el) {
  const row = el.closest('tr');
  const price = parseFloat(row.cells[1].querySelector('input').value) || 0;
  const days = parseFloat(row.cells[2].querySelector('input').value) || 0;
  const amount = Math.round(price * days);
  
  row.cells[3].innerText = amount.toLocaleString();
  row.cells[2].querySelector('.print-only').innerText = days; // 인쇄용 값 업데이트
  
  updateAll();
}

function manualExpense() {
  isManualExpense = true;
  updateAll();
}

function updateAll() {
  let labor = 0;
  document.querySelectorAll('.amount').forEach(td => {
    labor += parseFloat(td.innerText.replace(/,/g,'')) || 0;
  });

  const expenseInput = document.getElementById('expenseAmountInput');
  let expense = 0;

  if (!isManualExpense) {
    expense = Math.round(labor * 0.1);
    expenseInput.value = expense;
  } else {
    expense = parseFloat(expenseInput.value) || 0;
  }

  const total = labor + expense;

  document.getElementById('laborSubtotal').innerText = labor.toLocaleString();
  document.getElementById('s-labor').innerText = labor.toLocaleString();
  document.getElementById('s-expense').innerText = expense.toLocaleString();
  document.getElementById('printExpense').innerText = expense.toLocaleString();
  document.getElementById('s-total').innerText = total.toLocaleString();
}

function resetTable() {
  if (!confirm('초기화 하시겠습니까?')) return;
  isManualExpense = false;
  document.querySelectorAll('#estimateTable tbody tr:not(.subtotal-row):not(.expense-row)').forEach(row => {
    row.cells[2].querySelector('input').value = 0;
    row.cells[3].innerText = 0;
    row.cells[2].querySelector('.print-only').innerText = 0;
  });
  document.getElementById('memoInput').value = '';
  updateAll();
}

function savePDF() {
  // 인쇄 전 메모 및 모든 스팬 업데이트
  const memoInput = document.getElementById('memoInput');
  const printMemo = document.getElementById('printMemo');
  printMemo.innerText = memoInput.value;

  // 인력 항목의 단가/일수 출력용 텍스트 최종 확인
  document.querySelectorAll('#estimateTable tbody tr').forEach(row => {
    const inputs = row.querySelectorAll('input');
    const spans = row.querySelectorAll('.print-only');
    if(inputs.length > 1 && spans.length > 1) {
        spans[0].innerText = parseFloat(inputs[0].value).toLocaleString();
        spans[1].innerText = inputs[1].value;
    }
  });

  window.print();
}
</script>

</body>
</html>
